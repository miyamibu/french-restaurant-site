<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Bistro Étoile ヒーロー">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5e8"/>
      <stop offset="1" stop-color="#f8efe4"/>
    </linearGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8c1520" stop-opacity=".6"/>
      <stop offset="1" stop-color="#6b0f1a" stop-opacity=".6"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#e7d9c6"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity=".35"/>
  <g>
    <circle cx="1350" cy="-50" r="400" fill="url(#wine)"/>
    <circle cx="-50" cy="850" r="340" fill="url(#wine)"/>
  </g>
  <g transform="translate(120, 540)">
    <text x="0" y="0" font-family="Playfair Display, Georgia, serif" font-weight="700" font-size="88" fill="#1f2937">Bistro Étoile</text>
    <text x="0" y="56" font-family="Noto Sans JP, sans-serif" font-size="28" fill="#6b7280">季節の食材を、軽やかなフレンチで</text>
  </g>
</svg>

